name: Release

# Publishes GitHub releases from versioned notes files: any
# .github/release-notes/v*.md without a matching release gets one, tagged
# at the triggering commit. Idempotent — existing releases are left alone.
# Push-driven because this repo's agent sessions can push commits but not
# tags, and their tokens cannot dispatch workflows.
on:
  push:
    branches: [main]
    paths: [".github/release-notes/*.md", ".github/workflows/release.yml"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create missing releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for notes in .github/release-notes/v*.md; do
            [ -e "$notes" ] || continue
            tag=$(basename "$notes" .md)
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "$tag: release exists"
              continue
            fi
            args=(--repo "$GITHUB_REPOSITORY" --title "openteam $tag" --notes-file "$notes")
            # The tag is created at this commit unless it already exists.
            git rev-parse -q --verify "refs/tags/$tag" >/dev/null || args+=(--target "$GITHUB_SHA")
            gh release create "$tag" "${args[@]}"
          done
