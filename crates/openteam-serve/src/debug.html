<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>openteam serve — debug</title>
  <style>
    /* Layout only — the page never styles domain data (ADR 0029): the
       snapshot and the event tail are dumped verbatim into <pre> blocks. */
    body { font: 14px/1.4 system-ui, sans-serif; margin: 0; color: #1a1a1a; background: #fafafa; }
    header { padding: 10px 16px; background: #1a1a1a; color: #fafafa; }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; }
    header small { opacity: 0.7; }
    main { display: grid; grid-template-columns: 320px 1fr; gap: 0; height: calc(100vh - 41px); }
    #sidebar { border-right: 1px solid #ddd; overflow-y: auto; padding: 8px; }
    #panels { display: grid; grid-template-rows: 1fr 1fr; overflow: hidden; }
    .panel { display: flex; flex-direction: column; overflow: hidden; border-bottom: 1px solid #ddd; }
    .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin: 8px 12px 4px; }
    pre { margin: 0 12px 12px; padding: 8px; background: #fff; border: 1px solid #eee; border-radius: 4px;
          overflow: auto; flex: 1; white-space: pre-wrap; word-break: break-word; font-size: 12px; }
    button { font: inherit; padding: 4px 10px; margin-bottom: 8px; cursor: pointer; }
    ul { list-style: none; margin: 0; padding: 0; }
    li { padding: 6px 8px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; }
    li:hover { background: #f0f0f0; }
    li.selected { background: #e6efff; border-color: #b3d1ff; }
    .rid { font-family: ui-monospace, monospace; font-size: 11px; color: #444; word-break: break-all; }
    .state { font-family: ui-monospace, monospace; font-size: 11px; color: #444; }
  </style>
</head>
<body>
  <header>
    <h1>openteam serve <small>— debug tail &amp; dump (not the GUI)</small></h1>
  </header>
  <main>
    <div id="sidebar">
      <button id="refresh" type="button">Refresh runs</button>
      <ul id="runs"></ul>
    </div>
    <div id="panels">
      <div class="panel">
        <h2>Snapshot <span id="snapshot-run" class="rid"></span></h2>
        <pre id="snapshot">Select a run.</pre>
      </div>
      <div class="panel">
        <h2>Event tail (SSE)</h2>
        <pre id="events"></pre>
      </div>
    </div>
  </main>

  <script>
    // The debug page tails and dumps. It NEVER interprets, folds, or styles
    // domain data (ADR 0029): the run list, snapshot, and event tail are all
    // rendered verbatim — the snapshot pretty-printed, one raw line per SSE
    // event, run state shown as plain text.
    let source = null;
    let selected = null;

    async function loadRuns() {
      const list = document.getElementById('runs');
      try {
        const runs = await (await fetch('/v1/runs')).json();
        list.innerHTML = '';
        for (const run of runs) {
          const li = document.createElement('li');
          li.dataset.runId = run.run_id;
          if (run.run_id === selected) li.classList.add('selected');
          const rid = document.createElement('div');
          rid.className = 'rid';
          rid.textContent = run.run_id;
          // State is dumped as plain text — never interpreted or color-coded
          // (ADR 0029: the page only tails and dumps, it never styles domain data).
          const state = document.createElement('span');
          state.className = 'state';
          state.textContent = ' [' + run.state + ']';
          const goal = document.createElement('div');
          goal.textContent = run.goal;
          li.appendChild(goal);
          li.appendChild(rid);
          rid.appendChild(state);
          li.addEventListener('click', () => selectRun(run.run_id));
          list.appendChild(li);
        }
        if (runs.length === 0) list.innerHTML = '<li>(no runs discovered)</li>';
      } catch (err) {
        list.innerHTML = '<li>failed to load runs: ' + err + '</li>';
      }
    }

    async function selectRun(runId) {
      selected = runId;
      document.querySelectorAll('#runs li').forEach(li =>
        li.classList.toggle('selected', li.dataset.runId === runId));
      document.getElementById('snapshot-run').textContent = runId;

      // Snapshot: fetch and pretty-print the JSON verbatim.
      const snapshot = document.getElementById('snapshot');
      try {
        const json = await (await fetch('/v1/runs/' + runId + '/snapshot')).json();
        snapshot.textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        snapshot.textContent = 'failed to load snapshot: ' + err;
      }

      // Event tail: a bare EventSource, one <pre> line appended per event.
      const events = document.getElementById('events');
      events.textContent = '';
      if (source) source.close();
      source = new EventSource('/v1/runs/' + runId + '/events');
      const append = (line) => {
        events.textContent += line + '\n';
        events.scrollTop = events.scrollHeight;
      };
      source.onmessage = (e) => append(e.data);
      // The id-less named control frame (ADR 0028) — surfaced, not interpreted.
      source.addEventListener('run_state', (e) => append('[run_state] ' + e.data));
      source.onerror = () => append('[stream closed]');
    }

    document.getElementById('refresh').addEventListener('click', loadRuns);
    loadRuns();
  </script>
</body>
</html>
